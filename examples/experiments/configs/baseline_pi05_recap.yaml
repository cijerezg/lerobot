# DRTC baseline for the pi05_rl ("Recap") policy.
#
# Mirrors the relevant fields from `recap-config-hilserl.json` so that this
# experiment uses the same policy + robot + camera + RTC setup that
# `python -m lerobot.rl.inference_pi05_async --config_path=recap-config-hilserl.json`
# would use, but driven through the DRTC client/server stack.
name: baseline_pi05_recap

# Hardware
robot_type: so101_follower
gpu: ""
client_host: ""
server_host: ""
robot_port: /dev/serial/by-id/usb-1a86_USB_Single_Serial_5876043763-if00
robot_id: so101_follower_2026_04_19_v0

# Cameras: pi05_rl expects observation.images.{wrist,top}.
camera1_name: wrist
camera1_path: /dev/video4
camera2_name: top
camera2_path: /dev/video0
camera_width: 800
camera_height: 600
camera_fps: 30
camera_fourcc: MJPG
camera_use_threaded_async_read: true
camera_allow_stale_frames: true

# Policy
policy_type: pi05_rl
pretrained_name_or_path: outputs/pi05_full_offline_recap_20260418_3/checkpoints/001000/pretrained_model

# DRTC parameters
estimator: jk
cooldown: true
latency_k: 1.5
epsilon: 1
# Pi05 supports a long horizon; cap at execution_horizon (30 in recap-config-hilserl.json
# rtc_config) to keep the chunk reasonable while still leaving slack for guidance.
actions_per_chunk: 50
s_min: 30
latency_alpha: 0.125
latency_beta: 0.25

# Timing -- env.fps in recap-config-hilserl.json is 30.
duration_s: 120.0
fps: 20

# Flow matching / RTC -- mirrors policy.num_inference_steps and policy.rtc_config
# from recap-config-hilserl.json. Keeping these in sync is critical: num_flow_matching_steps
# directly drives per-chunk GPU compute. With 8 steps the policy takes ~1.6s/chunk,
# which is the same as a chunk's wall-time at 30Hz (50/30 = 1.67s). That leaves
# zero headroom: by the time a new chunk arrives the action schedule has already
# drained, RTC has no prefix to overlap (rtc_not_applied_empty_prefix dominates),
# the new chunk re-anchors at a state that is ~1.6s stale, and with anchor
# encoding that compounds into a slow downward drift ("arm pushes into ground").
# recap-config-hilserl.json uses 3 steps -- match it exactly.
num_flow_matching_steps: 3
rtc_enabled: true
rtc_max_guidance_weight: 5.0
rtc_prefix_attention_schedule: linear
rtc_sigma_d: 1.0
rtc_full_trajectory_alignment: false

# inference_advantage: 1.0   # forces "Advantage: negative" in the prompt
# inference_advantage: 1.0 # forces "Advantage: positive" (current default)
# omit entirely            # uses policy.config.inference_advantage (1.0)

# Action filter: disabled for pi05_rl (anchor-encoded). The Butterworth lead
# filter (gain=1.4) was tuned for the absolute-encoded pi05 baseline; with
# anchor encoding it amplifies any small per-step delta bias and compounds
# into the arm pushing into the ground over time. The standalone reference
# (`inference_pi05_async.py`) uses a non-amplifying centered 5-tap moving
# average instead -- skipping the client-side filter entirely is the closest
# safe match until that smoother is ported over.
# action_filter_mode: none
action_filter_mode: butterworth
action_filter_butterworth_cutoff: 3.0
action_filter_gain: 1.4

# Diagnostics
full_diagnostics: true
trajectory_viz_enabled: false

# Teleop intervention (mirror inference_pi05_async behaviour, minimal scope).
# Press '5' on the keyboard to toggle intervention; while engaged, the leader's
# joint positions drive the follower. On disengage the action schedule is
# flushed so the next inference round re-anchors at the new pose. When not
# intervening, the leader gently tracks the follower via send_feedback.
# Port/id mirror the env.teleop block in recap-config-hilserl.json.
teleop_enabled: true
teleop_type: so101_leader
teleop_port: /dev/serial/by-id/usb-1a86_USB_Single_Serial_5A7A057748-if00
teleop_id: so101_leader_2026_04_16_v2
teleop_send_feedback: true
