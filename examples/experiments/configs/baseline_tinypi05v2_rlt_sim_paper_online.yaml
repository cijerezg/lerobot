# DRTC config for paper-cadence online RLT-head training in Squint SO101 sim.
#
# This keeps the original baseline_tinypi05v2_rlt_sim.yaml intact and changes
# only the online-learning cadence: stride-2 rollout collection, high update
# ratio, two critic updates per actor update, and actor execution after a short
# VLA warmup, matching the RLT paper's online loop as closely as this simulator
# and VLA inference latency allow.
#
# Run with:
#   ./scripts/run_drtc_experiment.sh --config baseline_tinypi05v2_rlt_sim_paper_online
name: baseline_tinypi05v2_rlt_squint_sim_paper_online

# Simulator
robot_type: squint_so101
gpu: ""
client_host: "local squint sim"
server_host: "local policy server"
robot_id: squint_so101_pickplace_20260513_paper_online
sim_headless: true
sim_squint_root: /home/jack/code/squint
sim_dataset_root: outputs/so101_pickplace_160_20260501a
sim_dataset_repo_id: jackvial/so101_pickplace_160_20260501a
sim_env_id:
sim_control_mode: pd_joint_target_delta_pos
sim_obs_mode: rgb+segmentation
sim_render_mode: rgb_array
sim_domain_randomization: false
sim_seed: 1000
sim_sensor_width: 224
sim_sensor_height: 224
sim_white_x_background: false
sim_max_episode_steps: 100
sim_success_reward_threshold: 0.5
sim_reset_seed_on_terminal: true
sim_bootstrap_dataset_episode: 0
sim_bootstrap_dataset_action_stride: 3
sim_video_dir: outputs/rlt_tinypi05v2_squint_marker_sim_paper_online_v7/videos
sim_video_fps: 20
sim_video_every_episodes: 1
sim_video_max_episodes: 30
sim_video_max_frames: 140

# The policy checkpoint expects observation.images.{side,top}.
camera1_name: side
camera2_name: top
camera_width: 800
camera_height: 600
camera_fps: 30
camera_fourcc:
camera_use_threaded_async_read: false
camera_allow_stale_frames: true

# Policy: 92k Tinypi VLA checkpoint trained on the dataset above.
policy_type: tinypi05v2_rlt
pretrained_name_or_path: outputs/train/2026-05-02/18-34-57_tinypi05_so101_pickplace_160_bs64_anchor/checkpoints/092000/pretrained_model
subtask_generation_enabled: false
subtask_regeneration_interval: 0

# RLT modules.
rlt_enabled: true
rlt_embedding_checkpoint: outputs/tinypi05v2_rlt_embedding/rlt_embedding_step_010000.pt
rlt_head_checkpoint:
rlt_chunk_size: 10
rlt_token_dim:
rlt_actor_hidden_dims: [512, 512, 512]
rlt_critic_hidden_dims: [512, 512, 512]
rlt_actor_residual_scale: 0.25
rlt_num_critics: 2
rlt_bc_beta: 2.0
rlt_jerk_beta: 0.001
rlt_reference_dropout_p: 0.5
rlt_intervention_reference_mode: original
rlt_action_std: 0.0

# Paper-aligned online loop:
# - warm up from VLA/bootstrap behavior, then execute actor online
# - collect overlapping C=10 action chunks at stride 2 control steps
# - high update ratio with two critic TD updates before each actor update
rlt_online_collection_enabled: true
rlt_online_training_enabled: true
rlt_warmup_episodes: 1
rlt_warmup_transitions: 24
rlt_replay_capacity: 50000
rlt_batch_size: 16
rlt_utd_ratio: 5
rlt_critic_updates_per_actor: 2
rlt_success_sample_fraction: 1.0
rlt_intervention_sample_fraction: 0.0
rlt_train_freq_s: 0.25
rlt_save_freq_steps: 250
rlt_output_dir: outputs/rlt_tinypi05v2_squint_marker_sim_paper_online_v7
rlt_online_buffer_path: outputs/rlt_tinypi05v2_squint_marker_sim_paper_online_v7/rlt_online_replay.pt
rlt_demo_buffer_path:
rlt_online_buffer_save_freq_transitions: 50
rlt_persist_buffer_on_shutdown: true

rlt_review_capture_enabled: true
rlt_review_jpeg_quality: 80
rlt_review_archive_path: outputs/rlt_tinypi05v2_squint_marker_sim_paper_online_v7/rlt_review_archive.pt
rlt_actor_lr: 0.0001
rlt_critic_lr: 0.0003
rlt_discount: 0.985
rlt_target_update_tau: 0.005
rlt_execute_after_train_steps: 1000
rlt_context_cache_size: 1024
rlt_transition_queue_size: 1024
rlt_grad_clip_norm: 20.0
rlt_q_abs_max: 100.0
rlt_action_deviation_abs_max: 20.0
rlt_loss_abs_max: 1000.0
rlt_safety_patience: 5

# DRTC parameters. s_min=2 makes inference/collection requests every two
# control ticks once a schedule exists, matching the paper's stride-2 chunk
# subsampling. The policy still emits its full 50-step VLA horizon.
estimator: jk
cooldown: true
latency_k: 1.5
epsilon: 0
actions_per_chunk: 50
s_min: 2
latency_alpha: 0.125
latency_beta: 0.25

# Timing
duration_s: 240.0
run_until_interrupt: false
fps: 10

# Flow matching / RTC
num_flow_matching_steps: 3
rtc_enabled: true
rtc_max_guidance_weight:
rtc_prefix_attention_schedule: linear
rtc_sigma_d: 0.2
rtc_full_trajectory_alignment: false

action_filter_mode: none
action_filter_butterworth_cutoff: 3.0
action_filter_gain: 1.0

# Diagnostics
full_diagnostics: true
trajectory_viz_enabled: false

# No manual teleop in headless sim; the simulator emits episode labels.
teleop_enabled: false
teleop_type:
teleop_port:
teleop_id:
teleop_send_feedback: false
