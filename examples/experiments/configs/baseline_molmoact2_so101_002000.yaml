# DRTC bring-up config for the fine-tuned MolmoAct2 SO101 checkpoint.
#
# This mirrors examples/experiments/configs/baseline_tinypi05v2.yaml for the
# robot, camera, timing, diagnostics, and teleop safety setup, but points the
# policy at the selected MolmoAct2 checkpoint below.
#
# Run with:
#   ./scripts/run_drtc_experiment.sh --config baseline_molmoact2_so101_002000
name: baseline_molmoact2_so101_002000

# Hardware
robot_type: so101_follower
gpu: ""
client_host: ""
server_host: ""
robot_port: /dev/serial/by-id/usb-1a86_USB_Single_Serial_5876043763-if00
robot_id: so101_follower_2026_04_26_v0

# The checkpoint config expects observation.images.{scene,wrist}. DRTC maps by
# camera name, so keep these keys aligned with the policy preprocessor. Use
# stable V4L symlinks instead of /dev/videoN, since numeric video nodes can
# change across restarts or USB port changes.
camera1_name: scene
camera1_path: /dev/v4l/by-id/usb-H264_USB_Camera_H264_USB_Camera_2020032801-video-index0
camera2_name: wrist
camera2_path: /dev/v4l/by-id/usb-5MP_USB_Camera_5MP_USB_Camera_01.00.00-video-index0
camera_width: 800
camera_height: 600
camera_fps: 30
camera_fourcc: MJPG
camera_use_threaded_async_read: true
camera_allow_stale_frames: true

# Policy
policy_type: molmoact2
# pretrained_name_or_path: /home/jack/code/MolmoAct2/lerobot/outputs/molmoact2_so101_pickplace_60_action_expert/checkpoints/002000/pretrained_model
# pretrained_name_or_path: /mnt/2tb/models/molmoact2_so101_pickplace_160eps_10k_action_expert/checkpoints/007000/pretrained_model/
# pretrained_name_or_path: /home/jack/code/lerobot/outputs/molmoact2_so101_placemotor_e35trimidle_10k_action_expert_v4/checkpoints/020000/020000/pretrained_model
pretrained_name_or_path: /home/jack/code/lerobot/outputs/molmoact2_so101_placemotor_e51_v6/checkpoints/030000/030000/pretrained_model

# DRTC parameters. MolmoAct2's checkpoint chunk_size/n_action_steps is 30, so
# keep actions_per_chunk <= 30.
estimator: jk
cooldown: true
latency_k: 1.5
epsilon: 1
actions_per_chunk: 30
s_min: 5
latency_alpha: 0.125
latency_beta: 0.25

# Timing
duration_s: 1000.0
run_until_interrupt: true
fps: 30

# Flow matching / RTC.
# num_flow_matching_steps maps to MolmoAct2's continuous solver steps; this
# matches the working standalone command's --num-steps 5.
#
# Set rtc_enabled: false for a strict parity check against the standalone
# MolmoAct2 inference script.
num_flow_matching_steps: 3
rtc_enabled: true
rtc_max_guidance_weight:
rtc_prefix_attention_schedule: linear
rtc_sigma_d: 1.0
rtc_full_trajectory_alignment: false

# Action smoothing. The max-step limiter mirrors the standalone MolmoAct2
# command's --max-step-deg 5, while the mild low-pass filter damps chunk-boundary
# micro-jumps without changing the policy/RTC path.
action_filter_mode: butterworth
action_filter_butterworth_cutoff: 4.0
action_filter_butterworth_order: 2
action_filter_gain: 1.0
action_max_step_deg: 5.0

# Diagnostics
full_diagnostics: true
trajectory_viz_enabled: false

# Teleop intervention
teleop_enabled: true
teleop_type: so101_leader
teleop_port: /dev/serial/by-id/usb-1a86_USB_Single_Serial_5A7A057748-if00
teleop_id: so101_leader_2026_04_16_v2
teleop_send_feedback: true
