# DRTC config for tinypi05v2_rlt VLA rollouts with async RLT-head training.
#
# This is the tinypi05v2 sibling of `baseline_tinypi05_rlt.yaml`. It keeps
# execution on frozen-VLA passthrough while the server trains the RLT
# actor/critic head asynchronously from collected rollout transitions.
#
# Run with:
#   ./scripts/run_drtc_experiment.sh --config baseline_tinypi05v2_rlt
name: baseline_tinypi05v2_rlt_async_train

# Hardware
robot_type: so101_follower
gpu: ""
client_host: ""
server_host: ""
robot_port: /dev/serial/by-id/usb-1a86_USB_Single_Serial_5876043763-if00
robot_id: so101_follower_2026_04_26_v0

# Cameras: tinypi05v2_rlt expects observation.images.{side,top} for this checkpoint.
camera1_name: side
camera1_path: /dev/video0
camera2_name: top
camera2_path: /dev/video4
camera_width: 800
camera_height: 600
camera_fps: 30
camera_fourcc: MJPG
camera_use_threaded_async_read: true
camera_allow_stale_frames: true

# Policy
policy_type: tinypi05v2_rlt
pretrained_name_or_path: outputs/train/2026-05-02/18-34-57_tinypi05_so101_pickplace_160_bs64_anchor/checkpoints/092000/pretrained_model
subtask_generation_enabled: false
subtask_regeneration_interval: 0

# RLT modules. Leave the head unset so rollouts stay frozen-VLA passthrough.
rlt_enabled: true

# Always set this. Train it first via `train_tinypi05v2_rlt_embedding`.
rlt_embedding_checkpoint: outputs/tinypi05v2_rlt_embedding/rlt_embedding_latest.pt

# Leave unset for this config. If a head checkpoint is loaded, the RLT actor is
# considered available and may execute instead of pure VLA passthrough.
rlt_head_checkpoint:
rlt_chunk_size: 10
# Leave unset for tinypi05v2_rlt so it matches the TinyPI05V2 VLM width.
rlt_token_dim:
rlt_actor_hidden_dims: [512, 512, 512]
rlt_critic_hidden_dims: [512, 512, 512]
rlt_actor_residual_scale: 0.25
rlt_num_critics: 4
rlt_bc_beta: 0.1
rlt_jerk_beta: 0.001
rlt_reference_dropout_p: 0.5

# VLA rollouts with async online RLT-head training. Actor execution is held off
# by rlt_execute_after_train_steps so collection remains VLA passthrough.
rlt_online_collection_enabled: true
rlt_online_training_enabled: true
rlt_warmup_episodes: 1
rlt_warmup_transitions: 256
rlt_replay_capacity: 50000
rlt_batch_size: 256
rlt_utd_ratio: 1
rlt_train_freq_s: 1.0
rlt_save_freq_steps: 100
rlt_output_dir: outputs/rlt_tinypi05v2_online
rlt_demo_buffer_path:
rlt_online_buffer_path: outputs/rlt_tinypi05v2_online/rlt_online_replay.pt
rlt_online_buffer_save_freq_transitions: 100
rlt_persist_buffer_on_shutdown: true
rlt_actor_lr: 0.0003
rlt_critic_lr: 0.0003
rlt_discount: 0.985
rlt_target_update_tau: 0.005
rlt_execute_after_train_steps: 1000000
rlt_context_cache_size: 256
rlt_transition_queue_size: 256
rlt_grad_clip_norm: 20.0
rlt_q_abs_max: 100.0
rlt_action_deviation_abs_max: 2.0
rlt_loss_abs_max: 1000.0
rlt_safety_patience: 3

# DRTC parameters
estimator: jk
cooldown: true
latency_k: 1.5
epsilon: 1
actions_per_chunk: 50
s_min: 15
latency_alpha: 0.125
latency_beta: 0.25

# Timing
duration_s: 120.0
run_until_interrupt: true
fps: 30

# Flow matching / RTC
num_flow_matching_steps: 5
rtc_enabled: true
rtc_max_guidance_weight:
rtc_prefix_attention_schedule: linear
rtc_sigma_d: 0.2
rtc_full_trajectory_alignment: false

# Start without extra client-side filtering while establishing RLT parity.
action_filter_mode: butterworth
action_filter_butterworth_cutoff: 3.0
action_filter_gain: 1.0

# Diagnostics
full_diagnostics: true
trajectory_viz_enabled: false

# Teleop intervention
teleop_enabled: true
teleop_type: so101_leader
teleop_port: /dev/serial/by-id/usb-1a86_USB_Single_Serial_5A7A057748-if00
teleop_id: so101_leader_2026_04_16_v2
teleop_send_feedback: true
