# =============================================================================
# Unified RL training config  —  PI05 and MolmoAct2
# =============================================================================
# Used by:
#   - lerobot/src/lerobot/rl/rl_offline.py   (offline BC / offline RL)
#   - lerobot/src/lerobot/rl/rl_learner.py   (online distributed learner)
#   - lerobot/src/lerobot/rl/inference_async.py  (online distributed actor)
#
# Schema: TrainRLServerPipelineConfig in lerobot/src/lerobot/configs/train.py
#
# ── HOW TO SWITCH MODELS ─────────────────────────────────────────────────────
# 1. Set policy.type to the model you want.
# 2. Adjust the hot knobs in the model's section.
# rl_offline.py automatically strips fields that belong to the inactive model
# before passing the config to draccus, so all sections can coexist here.
# =============================================================================


# ── SWITCH MODEL: set policy.type below and adjust that model's hot knobs ─────


# -----------------------------------------------------------------------------
# Hot knobs (changed often)
# -----------------------------------------------------------------------------
offline_output_dir: outputs/molmoact2_bc_offline
batch_size: 8


# -----------------------------------------------------------------------------
# Dataset (shared by both models)
# -----------------------------------------------------------------------------
dataset:
  root: outputs/annotated-dataset-v7
  repo_id: cijerezg/yellow-car-offline-training-v2
  use_imagenet_stats: false
  max_episodes: null
  additional_offline_dataset_paths: []   # datasets generated from inference


# -----------------------------------------------------------------------------
# RL flags (shared)
# -----------------------------------------------------------------------------
skip_critic: false
treat_main_dataset_as_golden: true


# -----------------------------------------------------------------------------
# Validation (shared)
# -----------------------------------------------------------------------------
val_dataset_path: outputs/annotated-dataset-validation-v7
val_split: 0.0
val_freq: 500
val_on_start: true     # run probes at step 0 to catch wiring bugs before training amortizes them


# =============================================================================
# Policy: MolmoAct2  (active when policy.type: molmoact2_rl)
# =============================================================================
policy:
  type: molmoact2_rl

  # ---- Identity & checkpoint ------------------------------------------------
  task: "Pick up the red truck and put it in the bowl"
  pretrained_path: outputs/molmoact2_bc_offline/checkpoints/002000/pretrained_model
  checkpoint_path: outputs/MolmoAct2-SO100_101

  # ---- Training mode --------------------------------------------------------
  # KI-style training: VLM trained by discrete CE on FAST tokens, action expert
  # trained by the flow loss. knowledge_insulation detaches K/V going
  # into the action expert so its gradients do not leak back into the VLM.
  # Set train_action_expert_only=true and action_mode=continuous to fall back
  # to the original "freeze VLM, train action expert only" recipe.
  action_mode: both
  inference_action_mode: continuous
  discrete_action_tokenizer: /home/user/Documents/Research/RL/LeRobot/outputs/MolmoAct-FAST-tokenizer
  knowledge_insulation: true
  train_action_expert_only: false
  freeze_embedding: true                # we never train token embeddings
  gradient_checkpointing: true

  # ---- Per-submodule freeze schedule ----------------------------------------
  # null = freeze; int N = train layers with index >= N.
  # ViT depth = 25 (resblocks 0..24); language transformer depth = 36.
  # Implicit rules:
  #   • vision_from_layer set → image_pooling_2d + image_projector train too
  #   • language_from_layer set → final layer norm (ln_f) + lm_head train too
  #   • action expert is always trained
  # Critic_* knobs are ignored when skip_critic: true.
  trainable_params:
    vision_from_layer: null
    language_from_layer: 18
    critic_vision_from_layer: null
    critic_language_from_layer: null

  # ---- Losses & optimizer ---------------------------------------------------
  optimizer_lr: 5.0e-5                  # action expert LR (VLM frozen)
  optimizer_grad_clip_norm: 1.0
  optimizer_weight_decay: 0.0

  # ---- Reward shaping -------------------------------------------------------
  reward_normalization_constant: 1.0
  terminal_failure_reward: -10.0
  advantage_scaling: 0.2

  # ---- Retain update with base weights (periodic EMA pull toward init) ------
  anchor_alpha: 0.2
  anchor_every_n_steps: 2000
  anchor_targets: [policy, critic]        # molmo optimizer group names

  # ---- Distributional critic (online RL; skip_critic: true → ignored) -------
  critic_llm_depth: 12
  num_value_bins: 101
  value_support_min: -2.0
  value_support_max: 0.0
  hl_gauss_sigma_ratio: 5.0
  critic_lr: 1.0e-4
  critic_target_update_weight: 0.005
  critic_target_update_every: 4
  discount: 0.97

  # ---- Buffer & training schedule -------------------------------------------
  offline_buffer_capacity: 100000
  online_buffer_capacity: 5000
  online_step_before_learning: 10         # transitions before first gradient step
  online_steps: 20000
  offline_steps: 10000
  policy_update_freq: 1
  critic_warmup_steps: 0
  utd_ratio: 1
  async_prefetch: false
  storage_device: cpu

  # ---- Inference -----------------------------------------------------------
  torch_compile: true                     # compile action expert + backbone with reduce-overhead
  action_clamp_limits: [[-105, 105], [-102, 102], [-95, 95], [-99, 99], [-159, 170], [1, 98]]
  inference_advantage: 1.0                # not yet wired (TODO: thread into build_inference_batch)
  weights_push_interval: 180.0            # seconds between learner→actor weight sync
  rtc_config:                             # real-time chunking
    enabled: true
    execution_horizon: 10
    prefix_attention_schedule: LINEAR
    max_guidance_weight: 10.0
    debug: false
    debug_maxlen: 100

  # ---- Architecture ---------------------------------------------------------
  n_obs_steps: 1
  chunk_size: 30
  n_action_steps: 30
  num_inference_steps: 5                # flow-matching denoising steps
  gradient_accumulation_steps: 4        # effective batch = batch_size * grad_accum
  dtype: bfloat16

  # ---- Normalization --------------------------------------------------------
  norm_tag: so100_so101_molmoact2     # loads norm stats from HF checkpoint
  normalize_gripper: true             # must match base model (False crushes gripper to 1.0 via post-norm clamp)

  # ---- Action encoding -----------------------------------------------------
  # "absolute" (default) | "anchor" | "delta"
  action_encoding: absolute
  # Required when action_encoding is anchor/delta; ignored otherwise.
  action_encoding_stats_path: null

  # ---- Feature schema -------------------------------------------------------
  normalization_mapping:
    VISUAL: IDENTITY
    STATE: QUANTILES
    ACTION: QUANTILES
  input_features:
    observation.images.wrist:
      type: VISUAL
      shape: [3, 378, 378]
    observation.images.top:
      type: VISUAL
      shape: [3, 378, 378]
    observation.state:
      type: STATE
      shape: [6]
  output_features:
    action:
      type: ACTION
      shape: [6]

  # ---- Devices --------------------------------------------------------------
  device: cuda
  actor_device: cuda:0
  learner_device: cuda:0

  # ---- Distributed runtime (online actor↔learner) ---------------------------
  # Uncomment and fill in for distributed online training.
  # actor_learner_config:
  #   learner_host: 192.168.50.1
  #   learner_port: 50051
  #   policy_parameters_push_frequency: 180
  # concurrency:
  #   actor: threads
  #   learner: threads

  # ---- Hub (required by validate(); not actually pushed) --------------------
  repo_id: cijerezg/multi-task-toys-merged-v2


