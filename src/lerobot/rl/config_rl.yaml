# =============================================================================
# Unified RL training config  —  PI05 and MolmoAct2
# =============================================================================
# Used by:
#   - lerobot/src/lerobot/rl/rl_offline.py   (offline BC / offline RL)
#   - lerobot/src/lerobot/rl/rl_learner.py   (online distributed learner)
#   - lerobot/src/lerobot/rl/inference_async.py  (online distributed actor)
#
# Schema: TrainRLServerPipelineConfig in lerobot/src/lerobot/configs/train.py
#
# ── HOW TO SWITCH MODELS ─────────────────────────────────────────────────────
# 1. Set policy.type to the model you want.
# 2. Adjust the hot knobs in the model's section.
# rl_offline.py automatically strips fields that belong to the inactive model
# before passing the config to draccus, so all sections can coexist here.
# =============================================================================


# ── SWITCH MODEL: set policy.type below and adjust that model's hot knobs ─────


# -----------------------------------------------------------------------------
# Hot knobs (changed often)
# -----------------------------------------------------------------------------
offline_output_dir: outputs/molmoact2_bc_offline
batch_size: 8


# -----------------------------------------------------------------------------
# Dataset (shared by both models)
# -----------------------------------------------------------------------------
dataset:
  root: outputs/annotated-dataset-v7
  repo_id: cijerezg/yellow-car-offline-training-v2
  use_imagenet_stats: false
  max_episodes: null


# -----------------------------------------------------------------------------
# RL flags (shared)
# -----------------------------------------------------------------------------
skip_critic: true
treat_main_dataset_as_golden: false


# -----------------------------------------------------------------------------
# Validation (shared)
# -----------------------------------------------------------------------------
val_dataset_path: null
val_split: 0.0
val_freq: 500
val_on_start: false


# =============================================================================
# Policy: MolmoAct2  (active when policy.type: molmoact2_rl)
# =============================================================================
policy:
  type: molmoact2_rl

  # ---- Identity & checkpoint ------------------------------------------------
  task: "Pick up the red truck and put it in the bowl"
  checkpoint_path: /home/user/.cache/huggingface/hub/models--allenai--MolmoAct2-SO100_101/snapshots/d341b9e85ae433e0b0e4a0f871260658a71e443f

  # ---- Training mode --------------------------------------------------------
  # train_action_expert_only requires action_mode=continuous.
  # Change to enable_lora_vlm=true (+ action_mode: both) for full fine-tuning.
  action_mode: continuous
  train_action_expert_only: true        # freeze VLM; train flow-matching head only
  gradient_checkpointing: true

  # ---- Normalization --------------------------------------------------------
  norm_tag: so100_so101_molmoact2       # loads norm stats from HF checkpoint

  # ---- Sequence / chunking --------------------------------------------------
  n_obs_steps: 1
  chunk_size: 30
  n_action_steps: 30

  # ---- Training loop --------------------------------------------------------
  offline_steps: 10000
  gradient_accumulation_steps: 4        # effective batch = batch_size * grad_accum

  # ---- Optimizer ------------------------------------------------------------
  optimizer_lr: 5.0e-5                  # action expert LR (VLM frozen)
  optimizer_grad_clip_norm: 1.0
  optimizer_weight_decay: 0.0

  # ---- Replay buffer --------------------------------------------------------
  offline_buffer_capacity: 100000
  storage_device: cpu
  reward_normalization_constant: 1.0
  terminal_failure_reward: -10.0
  async_prefetch: false

  # ---- Architecture ---------------------------------------------------------
  model_dtype: bfloat16

  # ---- Feature schema -------------------------------------------------------
  normalization_mapping:
    VISUAL: IDENTITY
    STATE: QUANTILES
    ACTION: QUANTILES
  input_features:
    observation.images.wrist:
      type: VISUAL
      shape: [3, 224, 224]
    observation.images.top:
      type: VISUAL
      shape: [3, 224, 224]
    observation.state:
      type: STATE
      shape: [6]
  output_features:
    action:
      type: ACTION
      shape: [6]

  # ---- Online training -------------------------------------------------------
  online_steps: 20000
  online_buffer_capacity: 5000
  online_step_before_learning: 10         # transitions before first gradient step
  weights_push_interval: 180.0            # seconds between learner→actor weight sync

  # ---- Distributional critic (online RL; skip_critic: true → ignored) -------
  critic_llm_depth: 12
  num_value_bins: 101
  value_support_min: -2.0
  value_support_max: 0.0
  hl_gauss_sigma_ratio: 5.0
  critic_lr: 1.0e-4
  critic_target_update_weight: 0.005
  critic_target_update_every: 4
  discount: 0.97
  advantage_scaling: 0.2
  utd_ratio: 1
  critic_warmup_steps: 0
  policy_update_freq: 1

  # ---- Devices --------------------------------------------------------------
  device: cuda
  learner_device: cuda:0
  storage_device: cpu

  # ---- Distributed runtime (online actor↔learner) ---------------------------
  # Uncomment and fill in for distributed online training.
  # actor_learner_config:
  #   learner_host: 192.168.50.1
  #   learner_port: 50051
  #   policy_parameters_push_frequency: 180
  # concurrency:
  #   actor: threads
  #   learner: threads

  # ---- Hub (required by validate(); not actually pushed) --------------------
  repo_id: cijerezg/multi-task-toys-merged-v2


