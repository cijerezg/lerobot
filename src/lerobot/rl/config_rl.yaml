# -----------------------------------------------------------------------------
# Run identity & I/O
# -----------------------------------------------------------------------------
output_dir: null
job_name: molmoact2_bc
resume: false
seed: 42


# -----------------------------------------------------------------------------
# Logging / checkpointing
# -----------------------------------------------------------------------------
log_freq: 20
save_checkpoint: true
save_freq: 100                # online checkpoint cadence (optimizer steps)
offline_save_freq: 500        # offline checkpoint cadence
buffer_cache_dir: outputs/buffer_cache-v7
use_rerun: true


# -----------------------------------------------------------------------------
# Episode-level logging (online actor)
# -----------------------------------------------------------------------------
episode_logging_freq: 4        # log every Nth episode
episode_save_freq: 10          # save buffer snapshot every Nth episode
video_logging_cameras: [top, wrist]


# -----------------------------------------------------------------------------
# Dataloader
# -----------------------------------------------------------------------------
num_workers: 4


# -----------------------------------------------------------------------------
# Weights & Biases
# -----------------------------------------------------------------------------
wandb:
  enable: true
  project: so101_real-v1
  offline_project: so101_real_offline-v1
  disable_artifact: true


# =============================================================================
# Probes (run periodically inside rl_offline.py at val_freq)
# =============================================================================
# All probes enabled for validation diagnostics.
# Note: critic probes still skip themselves when skip_critic=true / no critic is present.
probe_parameters:
  # ---- Enable flags ---------------------------------------------------------
  enable_actions: true
  enable_representations: true
  enable_attention: true
  enable_offline_inference: true
  enable_spatial_memorization: true
  enable_action_drift_jacobian: true
  enable_spatial_memorization_jacobian: true
  enable_critic_values_distribution: true

  # ---- Common ---------------------------------------------------------------
  # Cheap defaults — 1 episode, few frames — surfaces wiring bugs quickly.
  # Bump these once the probes are validated.
  output_dir: outputs/probe
  mode: all
  max_episodes: 2
  n_frames_per_episode: 16
  random_seed: 42
  timestep: 0.5

  # ---- Actions / representations --------------------------------------------
  ref_max_episodes: 3
  ref_n_frames_per_episode: 32

  # Layers / subsampling (relevant once attention / spatial / jacobian are on)
  spatial_layers: "0"
  attn_eval_subsample: 5

  # offline_inference selects N random frames (see EvalOfflineConfig)
  offline_inference_n_frames: 5


# =============================================================================
# Environment (shared — real robot via gym_manipulator)
# =============================================================================
env:
  type: gym_manipulator
  name: real_robot
  fps: 30

  # ---- Robot ----------------------------------------------------------------
  robot:
    type: so101_follower
    port: /dev/ttyACM0
    id: follower_arm_v3
    cameras:
      wrist:
        type: opencv
        index_or_path: 0
        height: 480
        width: 640
        fps: 30
      top:
        type: opencv
        index_or_path: 2
        height: 480
        width: 640
        fps: 30

  # ---- Teleop ---------------------------------------------------------------
  teleop:
    type: so101_leader
    port: /dev/ttyACM1
    id: leader_arm_v3

  # ---- Processor (gym wrapper) ----------------------------------------------
  processor:
    control_mode: leader
    observation:
      display_cameras: false
      add_joint_velocity_to_observation: false
      add_current_to_observation: false
    image_preprocessing:
      resize_size: [378, 378]
    gripper:
      use_gripper: true
      gripper_penalty: 0.00
    reset:
      fixed_reset_joint_positions: [0.54, -90.69, 99.55, 73.70, -92.23, 42.71]
      reset_time_s: 10
      control_time_s: 200.0
      terminate_on_success: true
    reward_classifier:
      pretrained_path: null
      success_threshold: 0.5
      success_reward: 1.0
    max_gripper_pos: 30


  # ---- Feature schema (used by make_policy to infer input/output shapes) ----
  features:
    observation.images.wrist:
      type: VISUAL
      shape: [3, 378, 378]
    observation.images.top:
      type: VISUAL
      shape: [3, 378, 378]
    observation.state:
      type: STATE
      shape: [6]
    action:
      type: ACTION
      shape: [6]
  features_map:
    observation.images.wrist: observation.images.wrist
    observation.images.top: observation.images.top
    observation.state: observation.state
    action: action
