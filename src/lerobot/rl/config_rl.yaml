# -----------------------------------------------------------------------------
# Run identity & I/O
# -----------------------------------------------------------------------------
output_dir: null
job_name: molmoact2_bc
resume: false
seed: 42


# -----------------------------------------------------------------------------
# Logging / checkpointing
# -----------------------------------------------------------------------------
log_freq: 20
save_checkpoint: true
offline_save_freq: 500
use_rerun: false


# -----------------------------------------------------------------------------
# Weights & Biases
# -----------------------------------------------------------------------------
wandb:
  enable: true
  project: so101_real-v1
  offline_project: so101_real_offline-v1
  disable_artifact: true


# =============================================================================
# Environment (shared — real robot via gym_manipulator)
# =============================================================================
env:
  type: gym_manipulator
  name: real_robot
  fps: 30

  # ---- Feature schema (used by make_policy to infer input/output shapes) ----
  features:
    observation.images.wrist:
      type: VISUAL
      shape: [3, 128, 128]
    observation.images.top:
      type: VISUAL
      shape: [3, 128, 128]
    observation.state:
      type: STATE
      shape: [6]
    action:
      type: ACTION
      shape: [6]
  features_map:
    observation.images.wrist: observation.images.wrist
    observation.images.top: observation.images.top
    observation.state: observation.state
    action: action
