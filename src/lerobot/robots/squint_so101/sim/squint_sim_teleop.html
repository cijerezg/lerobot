<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squint SO101 Sim Teleop</title>
    <style>
        :root {
            --bg: #f4f1e8;
            --panel: #ffffff;
            --ink: #171717;
            --muted: #6b6257;
            --line: #1f1f1f;
            --accent: #2f6f73;
            --warn: #b43d2f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--ink);
            font-family: Helvetica, Arial, sans-serif;
            padding: 16px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 22px;
            margin: 0;
            letter-spacing: 0;
        }

        .status {
            border: 2px solid var(--line);
            padding: 8px 10px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            background: var(--warn);
            color: #fff;
        }

        .status.connected {
            background: var(--accent);
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .toolbar button {
            border: 2px solid var(--line);
            background: var(--panel);
            color: var(--ink);
            min-height: 32px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
        }

        .toolbar button:active {
            background: var(--accent);
            color: #fff;
        }

        .calibration-panel {
            border: 2px solid var(--line);
            background: var(--panel);
            padding: 10px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .calibration-panel button,
        .calibration-panel select,
        .calibration-panel input {
            border: 2px solid var(--line);
            background: #fff;
            color: var(--ink);
            min-height: 30px;
            padding: 5px 8px;
            font-size: 12px;
            font-weight: 800;
        }

        .calibration-panel input {
            width: 72px;
        }

        .calibration-panel label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .camera-status {
            color: var(--muted);
            font-family: "Courier New", monospace;
            font-size: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 14px;
        }

        .camera {
            background: var(--panel);
            border: 3px solid var(--line);
            min-width: 0;
        }

        .camera.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(47, 111, 115, 0.25);
        }

        .camera-title {
            border-bottom: 3px solid var(--line);
            padding: 8px 10px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .camera-tools {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .camera-tools button {
            border: 2px solid var(--line);
            background: #fff;
            color: var(--ink);
            width: 28px;
            height: 24px;
            padding: 0;
            font: inherit;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
        }

        .camera-tools button:active {
            background: var(--accent);
            color: #fff;
        }

        .camera-image {
            background: #111;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            cursor: grab;
            position: relative;
        }

        .camera-image.dragging {
            cursor: grabbing;
        }

        .camera-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            pointer-events: none;
            user-select: none;
        }

        .camera-pose {
            border-top: 2px solid var(--line);
            padding: 7px 10px;
            color: var(--muted);
            font-family: "Courier New", monospace;
            font-size: 11px;
            white-space: pre-wrap;
        }

        .meta {
            margin-top: 12px;
            border: 2px solid var(--line);
            background: var(--panel);
            padding: 10px;
            color: var(--muted);
            font-family: "Courier New", monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }

        .empty {
            border: 3px dashed var(--muted);
            padding: 24px;
            color: var(--muted);
            background: var(--panel);
        }
    </style>
</head>
<body>
    <header>
        <h1>Squint SO101 Sim Teleop</h1>
        <div class="toolbar">
            <button type="button" id="reset-sim" title="Reset simulator episode to the task start pose">Reset Sim</button>
            <button type="button" id="calibrate-follow" title="Save arm offsets from the current real leader pose to the current sim follower pose">Calibrate Follow</button>
            <button type="button" id="clear-follow-cal" title="Clear saved follow calibration">Clear Follow Cal</button>
            <button type="button" id="save-camera">Save Camera Pose</button>
            <div class="camera-status" id="camera-status">selected: --</div>
            <div class="status" id="status">Disconnected</div>
        </div>
    </header>
    <main>
        <section class="calibration-panel" aria-label="follow calibration controls">
            <button type="button" id="hold-follow">Hold Sim</button>
            <button type="button" id="resume-follow">Resume Follow</button>
            <button type="button" id="set-start" title="Set sim follower to the SO101 start keyframe used by the place task">Set Alignment Start</button>
            <label>
                Joint
                <select id="nudge-joint">
                    <option value="shoulder_pan">shoulder_pan</option>
                    <option value="shoulder_lift">shoulder_lift</option>
                    <option value="elbow_flex">elbow_flex</option>
                    <option value="wrist_flex">wrist_flex</option>
                    <option value="wrist_roll">wrist_roll</option>
                    <option value="gripper">gripper</option>
                </select>
            </label>
            <label>
                Step
                <input type="number" id="nudge-step" value="1" min="0.1" step="0.1">
            </label>
            <button type="button" id="nudge-negative">-</button>
            <button type="button" id="nudge-positive">+</button>
            <button type="button" id="flip-sign">Flip Sign</button>
            <button type="button" id="gripper-closed-ref" title="Record the current leader/sim gripper pair as the closed reference">Grip Closed Ref</button>
            <button type="button" id="gripper-open-ref" title="Record the current leader/sim gripper pair as the open reference">Grip Open Ref</button>
        </section>
        <div class="grid" id="camera-grid">
            <div class="empty">Waiting for sim camera frames...</div>
        </div>
        <div class="meta" id="meta">frames: 0 | step: -- | age: --</div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const wsPort = Number(params.get('ws_port') || 8099);
        const statusEl = document.getElementById('status');
        const cameraStatusEl = document.getElementById('camera-status');
        const resetSimButton = document.getElementById('reset-sim');
        const calibrateFollowButton = document.getElementById('calibrate-follow');
        const clearFollowCalButton = document.getElementById('clear-follow-cal');
        const holdFollowButton = document.getElementById('hold-follow');
        const resumeFollowButton = document.getElementById('resume-follow');
        const setStartButton = document.getElementById('set-start');
        const nudgeJointSelect = document.getElementById('nudge-joint');
        const nudgeStepInput = document.getElementById('nudge-step');
        const nudgeNegativeButton = document.getElementById('nudge-negative');
        const nudgePositiveButton = document.getElementById('nudge-positive');
        const flipSignButton = document.getElementById('flip-sign');
        const gripperClosedRefButton = document.getElementById('gripper-closed-ref');
        const gripperOpenRefButton = document.getElementById('gripper-open-ref');
        const saveCameraButton = document.getElementById('save-camera');
        const gridEl = document.getElementById('camera-grid');
        const metaEl = document.getElementById('meta');
        const cameraCards = new Map();
        let frameCount = 0;
        let lastTimestamp = null;
        let lastStep = null;
        let reconnectTimer = null;
        let socket = null;
        let cameraState = {};
        let cameraStatus = '';
        let selectedCamera = null;
        let activeDrag = null;

        function setStatus(text, connected) {
            statusEl.textContent = text;
            statusEl.className = connected ? 'status connected' : 'status';
        }

        function updateMeta(action) {
            const age = lastTimestamp ? `${Math.max(0, Date.now() / 1000 - lastTimestamp).toFixed(1)}s` : '--';
            const actionText = action ? JSON.stringify(action, null, 2) : '{}';
            metaEl.textContent = `frames: ${frameCount} | step: ${lastStep ?? '--'} | age: ${age}\n${actionText}`;
        }

        function updateCameraStatus() {
            const selected = selectedCamera || '--';
            cameraStatusEl.textContent = cameraStatus ? `selected: ${selected} | ${cameraStatus}` : `selected: ${selected}`;
        }

        function sendCameraControl(payload) {
            if (!socket || socket.readyState !== WebSocket.OPEN) return;
            socket.send(JSON.stringify({ type: 'camera_control', ...payload }));
        }

        function sendSimControl(payload) {
            if (!socket || socket.readyState !== WebSocket.OPEN) return;
            socket.send(JSON.stringify({ type: 'sim_control', ...payload }));
        }

        function selectCamera(name) {
            selectedCamera = name;
            for (const [cameraName, entry] of cameraCards.entries()) {
                entry.card.classList.toggle('selected', cameraName === selectedCamera);
            }
            updateCameraStatus();
        }

        function poseText(name) {
            const state = cameraState[name];
            if (!state) return 'eye: --\ntarget: --';
            const eye = state.eye.map((value) => Number(value).toFixed(4)).join(', ');
            const target = state.target.map((value) => Number(value).toFixed(4)).join(', ');
            return `eye:    [${eye}]\ntarget: [${target}]`;
        }

        function copyPose(name) {
            const state = cameraState[name];
            if (!state || !navigator.clipboard) return;
            navigator.clipboard.writeText(`${name}: ${JSON.stringify(state)}`).catch(() => {});
        }

        function saveCameraPose() {
            sendCameraControl({
                camera: selectedCamera,
                mode: 'save',
            });
        }

        function resetSim() {
            sendSimControl({ mode: 'reset' });
        }

        function calibrateFollow() {
            sendSimControl({ mode: 'calibrate_follow' });
        }

        function clearFollowCalibration() {
            sendSimControl({ mode: 'clear_follow_calibration' });
        }

        function holdFollow() {
            sendSimControl({ mode: 'hold_follow', enabled: true });
        }

        function resumeFollow() {
            sendSimControl({ mode: 'hold_follow', enabled: false });
        }

        function setFollowerKeyframe(name) {
            sendSimControl({ mode: 'set_follower_keyframe', keyframe: name });
        }

        function nudgeFollower(sign) {
            const step = Math.max(0.001, Number(nudgeStepInput.value) || 1);
            sendSimControl({
                mode: 'nudge_follower_joint',
                joint: nudgeJointSelect.value,
                delta: sign * step,
            });
        }

        function flipSelectedJointSign() {
            sendSimControl({
                mode: 'flip_follow_sign',
                joint: nudgeJointSelect.value,
            });
        }

        function recordGripperReference(name) {
            sendSimControl({
                mode: 'record_gripper_reference',
                reference: name,
            });
        }

        function onPointerDown(event, cameraName, imageWrap) {
            if (event.button !== 0 && event.button !== 2) return;
            event.preventDefault();
            selectCamera(cameraName);
            imageWrap.setPointerCapture(event.pointerId);
            imageWrap.classList.add('dragging');
            activeDrag = {
                pointerId: event.pointerId,
                camera: cameraName,
                mode: event.shiftKey || event.button === 2 ? 'pan' : 'orbit',
                x: event.clientX,
                y: event.clientY,
            };
        }

        function onPointerMove(event, imageWrap) {
            if (!activeDrag || activeDrag.pointerId !== event.pointerId) return;
            const dx = event.clientX - activeDrag.x;
            const dy = event.clientY - activeDrag.y;
            if (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5) return;
            activeDrag.x = event.clientX;
            activeDrag.y = event.clientY;
            sendCameraControl({
                camera: activeDrag.camera,
                mode: activeDrag.mode,
                dx,
                dy,
            });
        }

        function onPointerUp(event, imageWrap) {
            if (!activeDrag || activeDrag.pointerId !== event.pointerId) return;
            imageWrap.classList.remove('dragging');
            activeDrag = null;
        }

        function attachCameraMouse(imageWrap, cameraName) {
            imageWrap.addEventListener('contextmenu', (event) => event.preventDefault());
            imageWrap.addEventListener('pointerdown', (event) => onPointerDown(event, cameraName, imageWrap));
            imageWrap.addEventListener('pointermove', (event) => onPointerMove(event, imageWrap));
            imageWrap.addEventListener('pointerup', (event) => onPointerUp(event, imageWrap));
            imageWrap.addEventListener('pointercancel', (event) => onPointerUp(event, imageWrap));
            imageWrap.addEventListener('wheel', (event) => {
                event.preventDefault();
                sendCameraControl({
                    camera: cameraName,
                    mode: 'dolly',
                    dy: event.deltaY,
                });
            }, { passive: false });
        }

        function ensureCameraCard(camera) {
            const name = camera.name || 'camera';
            if (cameraCards.has(name)) return cameraCards.get(name);

            const card = document.createElement('div');
            card.className = 'camera';
            card.addEventListener('click', () => selectCamera(name));

            const title = document.createElement('div');
            title.className = 'camera-title';

            const titleText = document.createElement('span');
            titleText.textContent = name;

            const tools = document.createElement('div');
            tools.className = 'camera-tools';

            const copyButton = document.createElement('button');
            copyButton.type = 'button';
            copyButton.title = 'Copy camera pose';
            copyButton.textContent = '{}';
            copyButton.addEventListener('click', () => copyPose(name));

            const resetButton = document.createElement('button');
            resetButton.type = 'button';
            resetButton.title = 'Reset camera pose';
            resetButton.textContent = 'R';
            resetButton.addEventListener('click', () => sendCameraControl({ camera: name, mode: 'reset' }));

            tools.appendChild(copyButton);
            tools.appendChild(resetButton);
            title.appendChild(titleText);
            title.appendChild(tools);

            const imageWrap = document.createElement('div');
            imageWrap.className = 'camera-image';
            imageWrap.title = 'Drag to orbit. Shift-drag or right-drag to pan. Mouse wheel zooms.';
            const img = document.createElement('img');
            img.alt = `${name} frame`;
            imageWrap.appendChild(img);
            attachCameraMouse(imageWrap, name);

            const pose = document.createElement('div');
            pose.className = 'camera-pose';
            pose.textContent = poseText(name);

            card.appendChild(title);
            card.appendChild(imageWrap);
            card.appendChild(pose);
            gridEl.appendChild(card);

            const entry = { card, img, pose };
            cameraCards.set(name, entry);
            if (selectedCamera === null) selectCamera(name);
            else card.classList.toggle('selected', name === selectedCamera);
            return entry;
        }

        function moveSelectedCameraXY(event) {
            if (!selectedCamera) return;
            if (!['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(event.key)) return;
            const target = event.target;
            if (target && ['INPUT', 'TEXTAREA', 'SELECT', 'BUTTON'].includes(target.tagName)) return;
            event.preventDefault();
            const step = event.shiftKey ? 0.05 : (event.altKey ? 0.002 : 0.01);
            let dx = 0;
            let dy = 0;
            if (event.key === 'ArrowUp') dx = 1;
            if (event.key === 'ArrowDown') dx = -1;
            if (event.key === 'ArrowLeft') dy = 1;
            if (event.key === 'ArrowRight') dy = -1;
            sendCameraControl({
                camera: selectedCamera,
                mode: 'move_xy',
                dx,
                dy,
                step,
            });
        }

        function onFrame(data) {
            const cameras = Array.isArray(data.cameras) ? data.cameras : [];
            if (cameras.length === 0) return;

            frameCount += 1;
            lastTimestamp = Number(data.timestamp) || (Date.now() / 1000);
            lastStep = data.step;
            cameraState = data.camera_state || cameraState;
            cameraStatus = data.camera_status || cameraStatus;
            const empty = gridEl.querySelector('.empty');
            if (empty) empty.remove();
            const seen = new Set();

            for (const camera of cameras) {
                const name = camera.name || 'camera';
                const entry = ensureCameraCard(camera);
                entry.img.src = camera.data_url;
                entry.pose.textContent = poseText(name);
                seen.add(name);
            }
            for (const [name, entry] of cameraCards.entries()) {
                if (seen.has(name)) continue;
                entry.card.remove();
                cameraCards.delete(name);
                if (selectedCamera === name) selectedCamera = null;
            }
            if (selectedCamera === null && cameras.length > 0) selectCamera(cameras[0].name || 'camera');
            updateCameraStatus();
            updateMeta(data.action);
        }

        function connect() {
            clearTimeout(reconnectTimer);
            const wsUrl = `ws://${window.location.hostname}:${wsPort}`;
            socket = new WebSocket(wsUrl);
            setStatus('Connecting', false);

            socket.onopen = () => setStatus('Connected', true);
            socket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'frame') onFrame(data);
                } catch (error) {
                    console.error(error);
                }
            };
            socket.onclose = () => {
                setStatus('Disconnected', false);
                reconnectTimer = setTimeout(connect, 750);
            };
            socket.onerror = () => setStatus('Error', false);
        }

        resetSimButton.addEventListener('click', resetSim);
        calibrateFollowButton.addEventListener('click', calibrateFollow);
        clearFollowCalButton.addEventListener('click', clearFollowCalibration);
        holdFollowButton.addEventListener('click', holdFollow);
        resumeFollowButton.addEventListener('click', resumeFollow);
        setStartButton.addEventListener('click', () => setFollowerKeyframe('start'));
        nudgeNegativeButton.addEventListener('click', () => nudgeFollower(-1));
        nudgePositiveButton.addEventListener('click', () => nudgeFollower(1));
        flipSignButton.addEventListener('click', flipSelectedJointSign);
        gripperClosedRefButton.addEventListener('click', () => recordGripperReference('closed'));
        gripperOpenRefButton.addEventListener('click', () => recordGripperReference('open'));
        saveCameraButton.addEventListener('click', saveCameraPose);
        window.addEventListener('keydown', moveSelectedCameraXY);
        connect();
        setInterval(() => updateMeta(null), 1000);
    </script>
</body>
</html>
